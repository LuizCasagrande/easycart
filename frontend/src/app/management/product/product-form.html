<form (ngSubmit)="onSubmit()" [formGroup]="form">
  <p-card [header]="'Produto ' + (id ? '#' + id : '')">
    <ec-header-actions>
      <div ecTemplate="left">
        <p-button [text]="true"
                  icon="pi pi-arrow-left"
                  routerLink="/management/product" />
      </div>
      <div ecTemplate="right">
        <p-button (onClick)="reset()"
                  [text]="true"
                  icon="pi pi-plus" />
        <p-button [text]="true"
                  icon="pi pi-save"
                  type="submit" />
      </div>
    </ec-header-actions>

    <ec-field inputId="title" label="Título">
      <input formControlName="title"
             id="title"
             maxlength="250"
             pInputText
             type="text" />
    </ec-field>
    <ec-field inputId="description" label="Descrição">
      <textarea cols="30"
                formControlName="description"
                id="description"
                maxlength="750"
                pInputTextarea
                rows="3"></textarea>
    </ec-field>
    <ec-field inputId="price" label="Preço">
      <p-inputNumber [maxFractionDigits]="2"
                     [maxlength]="25"
                     [minFractionDigits]="2"
                     [min]="0"
                     formControlName="price"
                     inputId="price"
                     locale="pt-BR"
                     mode="decimal"
                     prefix="R$ " />
    </ec-field>
    <ec-field inputId="category" label="Categoria">
      <p-autoComplete (completeMethod)="findAllCategories()"
                      [dropdown]="true"
                      [maxlength]="100"
                      [suggestions]="categories"
                      emptyMessage="Vazio"
                      formControlName="category"
                      inputId="category" />
    </ec-field>
    <ec-field inputId="image" label="Imagem">
      <input formControlName="image"
             id="image"
             maxlength="250"
             pInputText
             type="text" />
      @if (getValue('image')) {
        <div class="text-center sm:text-left">
          <p-image [preview]="true"
                   [src]="getValue('image')"
                   alt="Image"
                   width="250" />
        </div>
      }
    </ec-field>
  </p-card>
</form>
