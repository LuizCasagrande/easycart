@if (product) {
  <p-card [header]="product.title">
    <ec-header-actions>
      <div ecTemplate="left">
        <p-button [text]="true"
                  icon="pi pi-arrow-left"
                  routerLink="/catalog" />
      </div>
    </ec-header-actions>

    <div class="flex align-items-center gap-1">
      <i class="pi pi-tag"></i>
      <span class="text-sm text-600">{{ product.category }}</span>
    </div>

    <div class="flex flex-wrap md:flex-nowrap">
      <p-image [alt]="product.title"
               [preview]="true"
               [src]="product.image"
               class="border-1 surface-border border-round mx-auto my-3 md:my-1"
               imageClass="border-round"
               width="350" />
      <div class="flex flex-column justify-content-between w-full p-0 md:p-3">
        <div class="flex flex-column gap-2">
          <div [title]="product.description" class="text-base">{{ product.description }}</div>
          <span class="text-lg font-semibold">{{ product.price | currency }}</span>
        </div>

        <div class="flex flex-column gap-3">
          <ec-field inputId="quantity" label="Quantidade">
            <p-inputNumber [(ngModel)]="product.quantity"
                           [max]="99"
                           [min]="1"
                           [prefix]="product.quantity! | quantity: 'prefix'"
                           [showButtons]="true"
                           buttonLayout="horizontal"
                           class="w-full md:w-16rem"
                           decrementButtonIcon="pi pi-minus"
                           incrementButtonIcon="pi pi-plus"
                           inputId="quantity"
                           inputStyleClass="w-10rem text-center" />
          </ec-field>
          <p-button (onClick)="addToCart()"
                    [outlined]="true"
                    icon="pi pi-shopping-cart"
                    label="Comprar"
                    styleClass="w-full md:w-16rem" />
        </div>
      </div>
    </div>
  </p-card>
}
