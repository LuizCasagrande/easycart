<p-card>
  <p-steps [activeIndex]="activeIndex"
           [model]="orderSteps"
           [readonly]="true" />
</p-card>
<div class="h-2rem"></div>

<div class="flex flex-wrap">
  <div class="w-12 xl:w-9">
    @switch (activeIndex) {
      @case (0) {
        <app-cart-product-list (onRemove)="remove($event)"
                               (onSetQuantity)="setQuantity($event.productId, $event.newQuantity)"
                               [products]="cartDto.products" />
      }
      @case (1) {
        <app-shipping [(selected)]="cartDto.shippingMethod"
                      [user]="cartDto.user" />
      }
      @case (2) {
        <app-payment [(selected)]="cartDto.paymentMethod" />
      }
      @case (3) {
        <app-confirmation [products]="cartDto.products"
                          [user]="cartDto.user" />
      }
    }
  </div>

  <div class="w-12 xl:w-3">
    <app-resume (onNavigate)="navigate($event)"
                [cart]="cartDto"
                [index]="activeIndex"
                [total]="getTotal()" />
  </div>
</div>
