<p-card header="Pedidos">
  <p-table (onLazyLoad)="load()"
           [lazy]="true"
           [loading]="loading"
           [paginator]="value.length > 0"
           [rowsPerPageOptions]="[10, 20, 30]"
           [rows]="10"
           [showCurrentPageReport]="true"
           [tableStyle]="{ 'min-width': '50rem' }"
           [totalRecords]="totalRecords"
           [value]="value"
           currentPageReportTemplate="{first} a {last} de {totalRecords} registros.">
    <ng-template pTemplate="header">
      <tr>
        <th displayName="Id" field="id" pSortableColumn="id" tableHeader></th>
        <th displayName="Data" field="date" pSortableColumn="date" tableHeader></th>
        <th displayName="Total" field="total" pSortableColumn="total" tableHeader></th>
        <th displayName="Forma Pgto." field="paymentMethod" pSortableColumn="paymentMethod" tableHeader></th>
        <th displayName="Produtos" tableHeader></th>
        <th class="w-6rem">&nbsp;</th>
      </tr>
    </ng-template>
    <ng-template let-order pTemplate="body">
      <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.date | date: 'shortDate' }}</td>
        <td>{{ order.total | currency }}</td>
        <td>{{ order.paymentMethod | paymentMethod }}</td>
        <td class="p-0">
          <app-order-product-chips [order]="order" />
        </td>
        <td class="p-0">
          <p-button [routerLink]="order.id"
                    [text]="true"
                    icon="pi pi-eye" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td class="text-center" colspan="5">Nenhum pedido encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
